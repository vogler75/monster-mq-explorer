  """
  Password for Neo4j authentication (not exposed in queries for security)
  """
  password: String

  """
  MQTT topic filters to subscribe to (supports wildcards +, #)
  """
  topicFilters: [String!]!

  """
  Maximum size of the path creation queue
  """
  queueSize: Int!

  """
  Number of messages to batch before writing to Neo4j
  """
  batchSize: Int!

  """
  Delay in milliseconds before attempting reconnection
  """
  reconnectDelayMs: Long!

  """
  Minimum seconds between value changes per topic (0 = no suppression)
  """
  maxChangeRateSeconds: Int!
}

