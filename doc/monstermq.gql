"""
NATS Client Bridge enables bidirectional messaging between MonsterMQ and a NATS server.

Outbound (MQTT → NATS): Subscribes to local MQTT topics and publishes payloads to NATS subjects.
Inbound  (NATS → MQTT): Subscribes to NATS subjects and republishes messages as local MQTT messages.

Features:
- Core NATS pub/sub and JetStream persistent streams
- Anonymous, username/password, token, and TLS authentication
- Automatic topic/subject separator translation (/ ↔ ., # ↔ >, + ↔ *)
- Per-address wildcard conversion toggle (autoConvert)
- Configurable reconnect behaviour
"""
enum NatsClientMode {
  """
  Bring messages IN from NATS to the local MQTT broker (NATS → MQTT)
  """
  SUBSCRIBE

  """
  Push messages OUT from the local MQTT broker to NATS (MQTT → NATS)
  """
  PUBLISH
}

