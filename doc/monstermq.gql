"""
Telegram Bot Client Bridge Configuration

Bidirectional bridge between the local MQTT broker and a Telegram Bot.

Topic structure (driven by device namespace):
- {namespace}/chats        — retained JSON array of registered chat IDs
- {namespace}/in/{chatId}  — incoming messages from Telegram
- {namespace}/out/{chatId} — publish here to send a message to a Telegram chat

Bot commands:
- /start — registers the chat, adds chatId to the retained chats topic
- /stop  — unregisters the chat, removes chatId

Features:
- No external SDK — uses Telegram Bot API directly via HTTP
- Long polling for receiving messages
- Allowed-users whitelist (empty = all users allowed)
- Supports Text, HTML, Markdown, and MarkdownV2 parse modes
