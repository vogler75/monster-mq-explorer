"""
Neo4j Client subscribes to MQTT topics and writes them to a Neo4j graph database,
creating a hierarchical representation of the topic tree.

Features:
- Topic tree stored as graph nodes (MqttNode for hierarchy, MqttValue for leaf nodes)
- Batch writing for efficient data insertion
- Asynchronous path creation to avoid blocking
- Configurable topic filters to select which topics to store
- Metrics tracking for monitoring connector health

Graph Structure:
- MqttNode: Represents topic hierarchy levels (e.g., "factory", "factory/machine1")
- MqttValue: Represents actual topic values (leaf nodes)
- HAS relationships: Connect nodes in the hierarchy (parent HAS child)
"""
type Neo4jClientConfig {
  """
  Neo4j connection URL (e.g., "bolt://localhost:7687", "neo4j://localhost:7687")
