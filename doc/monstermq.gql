"""
JDBC Logger subscribes to MQTT topics and writes validated JSON messages to database tables
using JDBC bulk operations. It validates incoming messages against a JSON Schema and extracts
fields for database insertion.

Features:
- JSON Schema validation for incoming messages
- Configurable field extraction and mapping
- Dynamic or fixed table name selection via JSONPath
- Memory or disk-based buffering for resilience
- JDBC bulk/batch writing for performance
- Connection failure handling with automatic retry
- Support for multiple database types (QuestDB, PostgreSQL, TimescaleDB)

Use Cases:
- Time-series data logging to QuestDB for fast ingestion
- IoT sensor data archival to PostgreSQL
- Industrial data collection to TimescaleDB
"""
enum JDBCLoggerDatabaseType {
  """
  QuestDB - high-performance time-series database
  """
  QUESTDB

  """
  PostgreSQL - general-purpose relational database
  """
  POSTGRESQL

  """
  TimescaleDB - PostgreSQL extension for time-series data
  """
  TIMESCALEDB

  """
  MySQL - popular open-source relational database
  """
  MYSQL

  """
  Snowflake - cloud data warehouse with streaming ingest
  """
  SNOWFLAKE
}

