  List of addresses to poll
  """
  addresses: [Plc4xAddressInput!] = []
}

"""
Metrics for a PLC4X device connector
"""
type Plc4xDeviceMetrics {
  """
  Messages per second read from PLC device and published to MQTT
  """
  messagesInRate: Float!

  """
  Connection status to PLC device
  """
  connected: Boolean!

  """
  ISO 8601 timestamp when these metrics were captured
  """
  timestamp: String!
}

"""
PLC4X Device Mutations - Grouped operations for PLC4X device management
"""
type Plc4xDeviceMutations {
  """
  Create a new PLC4X client configuration to connect to an industrial PLC
  Creates a client connector that will be deployed on the specified cluster node
  The client will automatically connect and poll configured addresses
  """
  create(input: Plc4xClientInput!): Plc4xClientResult!

  """
  Update an existing PLC4X client configuration
  Changes take effect immediately - the client connector will be redeployed with new settings
  Useful for modifying connection parameters, polling intervals, or addresses
  """
  update(name: String!, input: Plc4xClientInput!): Plc4xClientResult!

  """
  Delete a PLC4X client configuration permanently
  Stops the client connector and removes all configuration data
  Returns true if deletion was successful, false if client was not found
  """
  delete(name: String!): Boolean!

  """
  Start a PLC4X client connection
  Enables a previously stopped client and establishes connection to PLC
  """
  start(name: String!): Plc4xClientResult!

  """
  Stop a PLC4X client connection
  Disables the client and disconnects from PLC while preserving configuration
  """
  stop(name: String!): Plc4xClientResult!

  """
  Toggle PLC4X client enabled state
  Enable or disable a PLC4X client without deleting its configuration
  """
  toggle(name: String!, enabled: Boolean!): Plc4xClientResult!

  """
  Reassign a PLC4X client to a different cluster node
  Moves the client connector from one node to another for load balancing
  The client configuration remains unchanged, only the deployment location changes
  """
  reassign(name: String!, nodeId: String!): Plc4xClientResult!

  """
  Add a new address to an existing PLC4X client
  Defines a new PLC tag/address to poll and publish to MQTT
  New addresses will immediately start being polled
  """
  addAddress(deviceName: String!, input: Plc4xAddressInput!): Plc4xClientResult!

  """
  Remove an address from a PLC4X client
  Stops polling the specified address while keeping other addresses active
  """
  deleteAddress(deviceName: String!, addressName: String!): Plc4xClientResult!
}

"""
PLC4X Client connects to industrial PLCs using Apache PLC4X universal protocol adapter.
Supports multiple industrial protocols through a unified API with protocol-agnostic addressing.

Supported Protocols (19+):
- Siemens S7 (S7-300, S7-400, S7-1200, S7-1500)
- Modbus (TCP, RTU, ASCII)
- Beckhoff ADS (TwinCAT)
- Allen-Bradley (AB-Ethernet, EtherNet/IP)
- BACnet/IP
- KNXnet/IP
- CANopen
- Firmata (Arduino)
- IEC-60870-5-104
- And more...

Features:
- Universal connection string format (protocol://host:port)
- Protocol-specific address parsing handled automatically
- Polling-based value reading
- Value transformation (scaling, offset)
- Deadband filtering to reduce MQTT traffic
- Generic configuration works for all protocols
"""
enum Plc4xProtocol {
  """
  Allen-Bradley AB-Ethernet protocol
  """
  AB_ETHERNET

  """
  Beckhoff ADS/AMS protocol (TwinCAT)
  """
  ADS

  """
  BACnet/IP building automation protocol
  """
  BACNET_IP

  """
  Clipsal C-Bus home automation protocol
  """
  CBUS

  """
  CANopen industrial network protocol
  """
  CANOPEN

  """
  Emerson DeltaV DCS protocol
  """
  DELTAV

  """
  Allen-Bradley DF1 serial protocol
  """
  DF1

  """
  Rockwell Automation EtherNet/IP (formerly ControlNet)
  """
  ETHERNET_IP

  """
  Firmata protocol for Arduino and microcontrollers
  """
  FIRMATA

  """
  IEC 60870-5-104 telecontrol protocol for electrical engineering
  """
  IEC_60870

  """
  KNX building automation over IP
  """
  KNXNET_IP

  """
  Modbus TCP/IP industrial protocol
  """
  MODBUS_TCP

  """
  Modbus RTU serial protocol
  """
  MODBUS_RTU

  """
  Modbus ASCII serial protocol
  """
  MODBUS_ASCII

  """
  Atlas Copco Open Protocol for assembly tools
  """
  OPEN_PROTOCOL

  """
  Generic PLC4X protocol
  """
  PLC4X

  """
  Siemens S7 protocol (S7-300, S7-400, S7-1200, S7-1500)
  """
  S7

  """
  Mitsubishi Electric UMAS protocol
  """
  UMAS

  """
  Profinet protocol (experimental/in development)
  """
  PROFINET
}

input PublishInput {
  """
  MQTT topic to publish the message to (no wildcards allowed for publishing)
  Must follow MQTT topic naming conventions: use '/' as level separator
  """
  topic: String!

  """
  Message payload content - format depends on the 'format' field
  For JSON format: valid JSON string, for BINARY format: base64 encoded data
  """
  payload: String!

  """
  Specifies how the payload should be interpreted and processed
  JSON: payload is parsed as JSON, BINARY: payload is treated as base64 encoded binary data
  """
  format: DataFormat = JSON

  """
  MQTT Quality of Service level: 0 (at most once), 1 (at least once), 2 (exactly once)
  Higher QoS levels provide stronger delivery guarantees but with increased overhead
  """
  qos: Int = 0

  """
  Whether this message should be retained by the broker for future subscribers
  Retained messages are delivered to clients that subscribe after publication
  """
  retained: Boolean = false
}

type PublishResult {
  success: Boolean!
  topic: String!
  timestamp: Long!
  error: String
}

type PurgeResult {
  success: Boolean!
  message: String
  deletedCount: Long!
}

type Query {
  """
  Get the most recent value for a specific MQTT topic from the LastValueStore
  Returns the latest published value with timestamp and QoS information
  Useful for dashboard displays and current status monitoring
  """
  currentValue(
    """
    Exact MQTT topic name (no wildcards allowed)
    """
    topic: String!

    """
    Data format for the payload: JSON (parsed) or BINARY (base64 encoded)
    """
    format: DataFormat = JSON

    """
    ArchiveGroup containing the topic's last value store
    """
    archiveGroup: String = "Default"
  ): TopicValue

  """
  Get current values for multiple topics matching an MQTT topic filter
  Supports MQTT wildcards: '+' (single level) and '#' (multi-level)
  Returns array of most recent values from the LastValueStore
  """
  currentValues(
    """
    MQTT topic filter with wildcards: "sensor/+/temperature", "device/#", etc.
    """
    topicFilter: String!

    """
    Data format for all returned payloads
    """
    format: DataFormat = JSON

    """
    Maximum number of topics to return (ordered by topic name)
    """
    limit: Int = 100

    """
    ArchiveGroup to search within
    """
    archiveGroup: String = "Default"
  ): [TopicValue!]!

  """
  Get retained message for a specific MQTT topic from the RetainedMessageStore
  Retained messages persist until explicitly removed or overwritten
  Different from currentValue as it only includes messages published with retain=true
  """
  retainedMessage(
    """
    Exact MQTT topic name
    """
    topic: String!

    """
    Data format for the payload
    """
    format: DataFormat = JSON
  ): RetainedMessage

  """
  Get all retained messages matching an MQTT topic filter
  Returns messages that were published with the MQTT retain flag
  Useful for discovering what retained data exists in the system
  """
  retainedMessages(
    """
    MQTT topic filter with wildcards (optional - null returns all retained messages)
    """
    topicFilter: String

    """
    Data format for all payloads
    """
    format: DataFormat = JSON

    """
    Maximum number of messages to return
    """
    limit: Int = 100
  ): [RetainedMessage!]!

  """
  Query historical messages from the message archive
  Searches through time-series data stored for long-term analysis
  Returns messages within specified time range and topic filter
  """
  archivedMessages(
    """
    MQTT topic filter with wildcards to match archived messages
    """
    topicFilter: String!

    """
    ISO 8601 start timestamp: "2024-01-15T10:00:00Z" (optional - defaults to 24h ago)
    """
    startTime: String

    """
    ISO 8601 end timestamp: "2024-01-15T11:00:00Z" (optional - defaults to now)
    """
    endTime: String

    """
    Data format for all payloads
    """
    format: DataFormat = JSON

    """
    Maximum number of messages to return (ordered by timestamp)
    """
    limit: Int = 100

    """
    ArchiveGroup containing the message archive to search
    """
    archiveGroup: String = "Default"

    """
    Whether to include the topic name in each result (set to false when querying single topic for efficiency)
    """
    includeTopic: Boolean = true
  ): [ArchivedMessage!]!

  """
  Query aggregated historical data with time bucketing
  Returns time-series data aggregated by interval with multiple aggregation functions
  Useful for charting and analytics without retrieving raw data
  Performs database-level aggregation for efficiency
  """
  aggregatedMessages(
    """
    List of exact topic names (no wildcards allowed)
    Each topic will have its own columns in the result
    """
    topics: [String!]!

    """
    Aggregation time interval (bucket size)
    """
    interval: AggregationInterval!

    """
    ISO 8601 start timestamp (required)
    Example: "2024-01-15T10:00:00Z"
    """
    startTime: String!

    """
    ISO 8601 end timestamp (required)
    Example: "2024-01-15T11:00:00Z"
    """
    endTime: String!

    """
    Aggregation functions to apply (default: [AVG])
    Multiple functions create multiple columns per topic/field
    """
    functions: [AggregationFunction!] = [AVG]

    """
    Optional JSON field paths to extract from payload
    Applies to all topics - each field creates additional columns
    If empty or omitted, uses raw numeric payload value
    Examples: ["temperature", "pressure", "sensor.value"]
    """
    fields: [String!]

    """
    ArchiveGroup containing the message archive to search
    """
    archiveGroup: String = "Default"
  ): AggregatedResult!

  """
  Query recent system logs from the in-memory store
  Returns system logs from the circular buffer with optional filtering
  Time can be specified using startTime/endTime or lastMinutes
  """
  systemLogs(
    """
    ISO 8601 start timestamp: "2024-01-15T10:00:00Z" (optional)
    """
    startTime: String

    """
    ISO 8601 end timestamp: "2024-01-15T11:00:00Z" (optional - defaults to now)
    """
    endTime: String

    """
    Alternative to startTime/endTime: get logs from last N minutes
    """
    lastMinutes: Int

    """
    Optional node filter (exact match)
    """
    node: String

    """
    Optional log level filter: array of levels (INFO, WARNING, SEVERE) or single level string
    """
    level: [String!]

    """
    Optional logger name regex filter
    """
    logger: String

    """
    Optional source class regex filter
    """
    sourceClass: String

    """
    Optional source method regex filter
    """
    sourceMethod: String

    """
    Optional message regex filter
    """
    message: String

    """
    Maximum number of log entries to return (limited by in-memory buffer size)
    """
    limit: Int = 100

    """
    Sort order: ASC (oldest first) or DESC (newest first)
    """
    orderByTime: OrderDirection = DESC
  ): [SystemLogEntry!]!

  """
  Search for topics by name pattern using SQL LIKE wildcards
  Supports '%' (matches any sequence of characters) and '_' (matches single character)
  Examples:
    pattern: "sensor%" → finds all topics starting with "sensor"
    pattern: "%temperature%" → finds all topics containing "temperature"
    pattern: "device_0_" → finds topics like "device_01", "device_02", etc.
  Requires an ArchiveGroup to search within its last value store
  """
  searchTopics(
    """
    SQL LIKE pattern with % and _ wildcards
    """
    pattern: String!

    """
    Maximum number of topics to return
    """
    limit: Int = 100

    """
    ArchiveGroup name to search within (each group has its own last value store)
    """
    archiveGroup: String = "Default"
  ): [String!]!

  """
  Browse topics hierarchically using MQTT-style topic structure
  Uses MQTT topic conventions: '/' as level separator, '+' for single-level wildcard
  Returns only direct child topics (one level down) from the specified path
  Examples:
    topic: "opcua" → returns ["opcua/device1", "opcua/device2"] (not deeper levels)
    topic: "opcua/+" → returns all topics at opcua/device level like "opcua/device1/sensor1"
    topic: "+" → returns all top-level topic categories
  Requires an ArchiveGroup because topics are stored in the group's last value store
  """
  browseTopics(
    """
    MQTT topic path with optional '+' single-level wildcard
    """
    topic: String!

    """
    ArchiveGroup name containing the topics (required for data isolation)
    """
    archiveGroup: String = "Default"
  ): [Topic!]!

  """
  Get the full broker configuration as loaded from config.yaml
  Exposes enabled features, ports, storage backends, and extension settings
  """
  brokerConfig: BrokerConfig!

  """
  Get broker node information and metrics for monitoring cluster health
