"""
Response type for aggregated queries - table format for efficient transfer
"""
type AggregatedResult {
  """
  Column headers: ["timestamp", "topic1_field_avg", "topic1_field_min", ...]
  """
  columns: [String!]!

  """
  Data rows: [[timestamp, value, value, ...], ...]
  Each row is an array where first element is ISO timestamp, rest are numeric values or null
  """
  rows: [[JSON]!]!

  """
  The aggregation interval used
  """
  interval: AggregationInterval!

  """
  Start time of the query range (ISO 8601)
  """
  startTime: String!

  """
  End time of the query range (ISO 8601)
  """
  endTime: String!

  """
  Number of topics queried
  """
  topicCount: Int!

  """
  Number of data rows returned
  """
  rowCount: Int!
}

"""
Aggregation functions for numeric data
"""
enum AggregationFunction {
  """
  Average value in bucket
  """
  AVG

  """
  Minimum value in bucket
  """
  MIN

  """
  Maximum value in bucket
  """
  MAX

  """
  Count of values in bucket
  """
  COUNT
}

"""
Aggregation interval buckets for time-series data
"""
enum AggregationInterval {
  """
  1 minute buckets
  """
  ONE_MINUTE

  """
  5 minute buckets
  """
  FIVE_MINUTES

  """
  15 minute buckets
  """
  FIFTEEN_MINUTES

  """
  1 hour buckets
  """
  ONE_HOUR

  """
  1 day buckets
  """
  ONE_DAY
}

