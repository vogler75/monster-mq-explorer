<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded rectangle (macOS Squircle style) -->
  <rect width="32" height="32" rx="7.5" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
  
  <!-- Topic Tree Nodes inside the lens -->
  <!-- Top Node -->
  <circle cx="14" cy="11" r="2" fill="#0891b2" stroke="#1e293b" stroke-width="1"/>
  
  <!-- Connection lines -->
  <path d="M14 13 v3 M9 18 h10 M9 18 v2 M19 18 v2" stroke="#1e293b" stroke-width="1" stroke-linecap="round"/>
  
  <!-- Bottom Left Node -->
  <circle cx="9" cy="21" r="2" fill="#0891b2" stroke="#1e293b" stroke-width="1"/>
  
  <!-- Bottom Right Node -->
  <circle cx="19" cy="21" r="2" fill="#0891b2" stroke="#1e293b" stroke-width="1"/>
  
  <!-- Magnifying Glass Ring (glowing cyan cyber ring) -->
  <circle cx="14" cy="16" r="7.5" fill="none" stroke="#22d3ee" stroke-width="1.8"/>
  
  <!-- Magnifying Glass Handle -->
  <path d="M19.5 21.5 l5.5 5.5" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M20 22 l4.5 4.5" stroke="#94a3b8" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="25" cy="27" r="0.6" fill="#22d3ee"/>
</svg>
